[tox]
envlist = py39,py310,py311,py312,coverage,lint
isolated_build = true
skip_missing_interpreters = true

[testenv]
deps =
    pytest>=7.0.0
    pytest-asyncio>=0.21.0
    pytest-mock>=3.10.0
    pytest-benchmark>=4.0.0
    pytest-xdist>=3.0.0
    pytest-timeout>=2.1.0
    coverage[toml]>=7.0.0
    redis>=4.5.0
    fastapi>=0.100.0
    uvicorn>=0.23.0
    httpx>=0.24.0
    pydantic>=2.0.0
    pyyaml>=6.0
    sounddevice>=0.4.0
    numpy>=1.24.0
    psutil>=5.9.0
commands =
    pytest tests/unit -v
    pytest tests/integration -v -m "not slow"

[testenv:py{39,310,311,312}-full]
commands =
    pytest tests/ -v --tb=short

[testenv:coverage]
deps =
    {[testenv]deps}
    coverage-badge>=1.1.0
commands =
    coverage erase
    coverage run -m pytest tests/
    coverage report -m
    coverage html
    coverage-badge -f -o coverage.svg

[testenv:lint]
deps =
    flake8>=6.0.0
    black>=23.0.0
    isort>=5.12.0
    mypy>=1.4.0
    pylint>=2.17.0
commands =
    black --check src/ tests/
    isort --check-only src/ tests/
    flake8 src/ tests/
    mypy src/
    pylint src/

[testenv:format]
deps =
    black>=23.0.0
    isort>=5.12.0
commands =
    black src/ tests/
    isort src/ tests/

[testenv:performance]
deps = {[testenv]deps}
commands =
    pytest tests/ -v -m "performance" --benchmark-only

[testenv:slow]
deps = {[testenv]deps}
commands =
    pytest tests/ -v -m "slow or stress"

[testenv:cross-platform]
deps = {[testenv]deps}
commands =
    pytest tests/ -v -m "cross_platform"

[testenv:e2e]
deps = {[testenv]deps}
commands =
    pytest tests/integration/test_end_to_end.py -v

[testenv:docs]
deps =
    sphinx>=7.0.0
    sphinx-rtd-theme>=1.3.0
    myst-parser>=2.0.0
commands =
    sphinx-build -b html docs docs/_build/html

[coverage:run]
source = src
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*
branch = true

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = htmlcov

[flake8]
max-line-length = 88
extend-ignore = 
    E203,  # whitespace before ':'
    E501,  # line too long (handled by black)
    W503,  # line break before binary operator
exclude =
    .git,
    __pycache__,
    .tox,
    .pytest_cache,
    build,
    dist,
    venv,
    .venv

[isort]
profile = black
multi_line_output = 3
line_length = 88
known_first_party = src

[mypy]
python_version = 3.9
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "sounddevice",
    "redis",
    "yaml",
    "psutil",
]
ignore_missing_imports = true