[tool:pytest]
minversion = 6.0
addopts = -ra -q --tb=short --strict-markers
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    slow: Tests that take longer to run (>5 seconds)
    performance: Performance and benchmark tests
    windows: Tests related to Windows platform
    windows_only: Tests that only run on Windows
    unix_only: Tests that only run on Unix-like systems
    requires_redis: Tests that require Redis server
    requires_audio: Tests that require audio hardware
    requires_tmux: Tests that require tmux
    cross_platform: Tests for cross-platform compatibility
    stress: Tests that put system under stress conditions
    e2e: End-to-end workflow tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning